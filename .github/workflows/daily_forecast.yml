name: Daily Carbon Price Forecast

on:
  schedule:
    # Run daily at 23:30 UTC
    - cron: '30 23 * * *'
  workflow_dispatch: # Enable manual triggers

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance prophet scikit-learn pandas numpy

    - name: Run Forecast Script
      run: python predict.py

    - name: Commit and Push Predictions
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add predictions.json
        if git diff --staged --quiet; then
          echo "No changes in predictions.json"
        else
          git commit -m "chore: auto-update daily price predictions [skip ci]"
          git push origin main
        fi
